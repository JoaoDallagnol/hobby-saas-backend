services:
  postgres:
    image: postgres:17-alpine
    container_name: hobby-saas-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hobby-saas-app-prod
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_CAPACITY: ${RATE_LIMIT_CAPACITY:-120}
      RATE_LIMIT_REFILL_TOKENS: ${RATE_LIMIT_REFILL_TOKENS:-120}
      RATE_LIMIT_REFILL_MINUTES: ${RATE_LIMIT_REFILL_MINUTES:-1}
      FEATURE_PHOTO_UPLOADS_ENABLED: ${FEATURE_PHOTO_UPLOADS_ENABLED:-true}
      FEATURE_SESSION_LOCATION_ENABLED: ${FEATURE_SESSION_LOCATION_ENABLED:-true}
      FEATURE_PHOTO_PROCESSING_ENABLED: ${FEATURE_PHOTO_PROCESSING_ENABLED:-true}
      FEATURE_GAMIFICATION_ENABLED: ${FEATURE_GAMIFICATION_ENABLED:-false}
      FEATURE_PLUS_ENABLED: ${FEATURE_PLUS_ENABLED:-false}
      CWEBP_BINARY: ${CWEBP_BINARY:-/usr/bin/cwebp}
      PHOTO_PROCESSING_POLL_DELAY_MS: ${PHOTO_PROCESSING_POLL_DELAY_MS:-10000}
      PHOTO_DELETION_POLL_DELAY_MS: ${PHOTO_DELETION_POLL_DELAY_MS:-30000}
      PHOTO_VISIBILITY_POLL_DELAY_MS: ${PHOTO_VISIBILITY_POLL_DELAY_MS:-5000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PRIVATE_BUCKET: ${R2_PRIVATE_BUCKET:-}
      R2_PUBLIC_BUCKET: ${R2_PUBLIC_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      BREVO_SMTP_USERNAME: ${BREVO_SMTP_USERNAME:-}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD:-}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.29-alpine
    container_name: hobby-saas-nginx-prod
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_UPSTREAM: ${APP_UPSTREAM:-app:8080}
      SSL_CERTIFICATE_PATH: ${SSL_CERTIFICATE_PATH:-/etc/nginx/certs/fullchain.pem}
      SSL_CERTIFICATE_KEY_PATH: ${SSL_CERTIFICATE_KEY_PATH:-/etc/nginx/certs/privkey.pem}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-2m}
      NGINX_RATE_LIMIT_RPS: ${NGINX_RATE_LIMIT_RPS:-10r/s}
      NGINX_RATE_LIMIT_BURST: ${NGINX_RATE_LIMIT_BURST:-20}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${NGINX_CERTS_DIR:-./deploy/nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_prod_data:
