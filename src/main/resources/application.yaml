spring:
  application:
    name: backend
  profiles:
    default: local

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

app:
  photo-processing:
    cwebp-binary: ${CWEBP_BINARY:/usr/bin/cwebp}
    poll-delay-ms: ${PHOTO_PROCESSING_POLL_DELAY_MS:10000}
    deletion-poll-delay-ms: ${PHOTO_DELETION_POLL_DELAY_MS:30000}
    visibility-poll-delay-ms: ${PHOTO_VISIBILITY_POLL_DELAY_MS:5000}
  features:
    photo-uploads: true
    session-location: true
    photo-processing: false
    gamification: true
    plus-features: false
  rate-limit:
    enabled: false
    capacity: 120
    refill-tokens: 120
    refill-minutes: 1

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
