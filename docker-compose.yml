services:
  s3mock:
    image: adobe/s3mock:5.1.0
    container_name: hobby-saas-s3mock
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: hobby-private,hobby-public
      COM_ADOBE_TESTING_S3MOCK_STORE_ROOT: /data
      COM_ADOBE_TESTING_S3MOCK_STORE_RETAIN_FILES_ON_EXIT: "true"
    ports:
      - "9090:9090"
    volumes:
      - s3mock_data:/data

  postgres:
    image: postgres:17-alpine
    container_name: hobby-saas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hobby_saas}
      POSTGRES_USER: ${POSTGRES_USER:-backend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backend} -d ${POSTGRES_DB:-hobby_saas}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hobby-saas-app
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hobby_saas}
      DB_USERNAME: ${POSTGRES_USER:-backend}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_CAPACITY: ${RATE_LIMIT_CAPACITY:-120}
      RATE_LIMIT_REFILL_TOKENS: ${RATE_LIMIT_REFILL_TOKENS:-120}
      RATE_LIMIT_REFILL_MINUTES: ${RATE_LIMIT_REFILL_MINUTES:-1}
      FEATURE_PHOTO_UPLOADS_ENABLED: ${FEATURE_PHOTO_UPLOADS_ENABLED:-false}
      FEATURE_SESSION_LOCATION_ENABLED: ${FEATURE_SESSION_LOCATION_ENABLED:-false}
      FEATURE_PHOTO_PROCESSING_ENABLED: ${FEATURE_PHOTO_PROCESSING_ENABLED:-false}
      FEATURE_GAMIFICATION_ENABLED: ${FEATURE_GAMIFICATION_ENABLED:-true}
      FEATURE_PLUS_ENABLED: ${FEATURE_PLUS_ENABLED:-true}
      CWEBP_BINARY: ${CWEBP_BINARY:-/usr/bin/cwebp}
      PHOTO_PROCESSING_POLL_DELAY_MS: ${PHOTO_PROCESSING_POLL_DELAY_MS:-10000}
      PHOTO_DELETION_POLL_DELAY_MS: ${PHOTO_DELETION_POLL_DELAY_MS:-30000}
      PHOTO_VISIBILITY_POLL_DELAY_MS: ${PHOTO_VISIBILITY_POLL_DELAY_MS:-5000}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-false}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN:-}
      LOCAL_AUTH_USER_ID: ${LOCAL_AUTH_USER_ID:-local-dev-user}
      LOCAL_AUTH_EMAIL: ${LOCAL_AUTH_EMAIL:-local-dev@example.com}
      LOCAL_AUTH_NAME: ${LOCAL_AUTH_NAME:-Local Dev User}
      LOCAL_AUTH_EMAIL_VERIFIED: ${LOCAL_AUTH_EMAIL_VERIFIED:-true}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://s3mock:9090}
      R2_PRESIGN_ENDPOINT: ${R2_PRESIGN_ENDPOINT:-http://localhost:9090}
      R2_PRIVATE_BUCKET: ${R2_PRIVATE_BUCKET:-hobby-private}
      R2_PUBLIC_BUCKET: ${R2_PUBLIC_BUCKET:-hobby-public}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:9090/hobby-public}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-local-access-key}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-local-secret-key}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      BREVO_SMTP_USERNAME: ${BREVO_SMTP_USERNAME:-}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      s3mock:
        condition: service_started

volumes:
  postgres_data:
  s3mock_data:
