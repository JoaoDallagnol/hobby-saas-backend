spring:
  application:
    name: backend
  profiles:
    default: local

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

app:
  rate-limit:
    enabled: false
    capacity: 120
    refill-tokens: 120
    refill-minutes: 1

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
