spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hobby_saas}
    username: ${DB_USERNAME:backend}
    password: ${DB_PASSWORD:backend}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true

app:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    capacity: ${RATE_LIMIT_CAPACITY:120}
    refill-tokens: ${RATE_LIMIT_REFILL_TOKENS:120}
    refill-minutes: ${RATE_LIMIT_REFILL_MINUTES:1}
  auth:
    firebase:
      project-id: ${FIREBASE_PROJECT_ID:}
      service-account-json-base64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:}
      service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    local:
      enabled: ${LOCAL_AUTH_ENABLED:false}
      token: ${LOCAL_AUTH_TOKEN:}
      user-id: ${LOCAL_AUTH_USER_ID:local-dev-user}
      email: ${LOCAL_AUTH_EMAIL:local-dev@example.com}
      name: ${LOCAL_AUTH_NAME:Local Dev User}
      email-verified: ${LOCAL_AUTH_EMAIL_VERIFIED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  integrations:
    r2:
      endpoint: ${R2_ENDPOINT:}
      bucket: ${R2_BUCKET:}
      access-key: ${R2_ACCESS_KEY:}
      secret-key: ${R2_SECRET_KEY:}
    google:
      places-api-key: ${GOOGLE_PLACES_API_KEY:}
    sentry:
      dsn: ${SENTRY_DSN:}
    brevo:
      smtp-username: ${BREVO_SMTP_USERNAME:}
      smtp-password: ${BREVO_SMTP_PASSWORD:}
